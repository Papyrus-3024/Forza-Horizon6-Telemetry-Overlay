<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FH6 Race-Review Workbench</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h1>FH6 Workbench</h1>

      <section class="panel">
        <h2>Capture</h2>
        <label class="row">
          <span>Bundled</span>
          <select id="captureSelect"><option value="">— none —</option></select>
        </label>
        <label class="row">
          <span>From file</span>
          <input type="file" id="fileInput" accept=".jsonl,.json,.txt,.bin" />
        </label>
        <div id="captureInfo" class="hint">No capture loaded.</div>
      </section>

      <section class="panel">
        <h2>Map</h2>
        <label class="row">
          <span>Style</span>
          <select id="mapSelect">
            <!-- Default to the lightweight road map: the seasonal AVIFs are ~53 MB each and
                 block first paint for many seconds. Seasonal maps stay one click away. -->
            <option value="spring">Spring</option>
            <option value="summer">Summer</option>
            <option value="autumn">Autumn</option>
            <option value="winter">Winter</option>
            <option value="road" selected>Road (Google-style)</option>
          </select>
        </label>
      </section>

      <section class="panel">
        <h2>Telemetry</h2>
        <div id="readout"></div>
      </section>
    </aside>

    <main id="stage">
      <section id="charts" class="panel-flush">
        <div id="chartStack"></div>
      </section>
      <section id="trackPanel" class="panel-flush">
        <canvas id="trackCanvas"></canvas>
      </section>
    </main>

    <footer id="controls">
      <button id="btnPlay" class="btn play">▶</button>
      <input type="range" id="timeline" min="0" max="1000" step="1" value="0" />
      <span id="timeLabel" class="mono">0.0s / 0.0s</span>
      <label class="speed">Speed
        <select id="speedSelect">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
          <option value="8">8×</option>
        </select>
      </label>
      <label class="speed">Lap
        <select id="lapSelect"><option value="">No laps</option></select>
      </label>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
