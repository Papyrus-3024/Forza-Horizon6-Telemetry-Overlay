name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dotnet:
    # Windows runner: the overlay targets net8.0-windows (WPF).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test FH6-Telemetry.sln -c Release

  web:
    # The web app is WIP and not part of the release, but its tests are cheap to keep green.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --test
        working-directory: web
